<div class="card">
  <div class="card_tittle">
    <lucide-angular
      [img]="cameraIcon"
      [size]="22"
      [strokeWidth]="2.4"
    ></lucide-angular>
    <h1>Imágenes de la solicitud</h1>
  </div>

  <p class="subtitle">
    Las imágenes son opcionales. Puede adjuntar evidencias visuales o continuar sin agregar archivos.
  </p>

  <div class="upload-actions">
    <label class="upload-zone" for="requestImages">
      <lucide-angular
        [img]="imagePlusIcon"
        [size]="34"
        [strokeWidth]="2.2"
      ></lucide-angular>
      <strong>Seleccionar imágenes</strong>
      <span>JPG, PNG o WEBP. Máximo 3 MB por archivo.</span>
      <input
        id="requestImages"
        type="file"
        accept="image/*"
        multiple
        (change)="onFilesSelected($event)"
      />
    </label>

    <label class="upload-zone camera-zone" for="captureImage">
      <lucide-angular
        [img]="cameraIcon"
        [size]="34"
        [strokeWidth]="2.2"
      ></lucide-angular>
      <strong>Tomar foto</strong>
      <span>Disponible en celular o tablet con cámara.</span>
      <input
        id="captureImage"
        type="file"
        accept="image/*"
        capture="environment"
        (change)="onFilesSelected($event)"
      />
    </label>
  </div>

  <div class="error-box" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <section class="image-grid" *ngIf="images.length; else emptyState">
    <article class="image-card" *ngFor="let image of images">
      <img [src]="image.dataUrl" [alt]="image.name" />
      <div class="image-meta">
        <strong>{{ image.name }}</strong>
        <span>{{ formatSize(image.size) }}</span>
      </div>
      <button
        type="button"
        class="delete-image"
        title="Eliminar imagen"
        (click)="removeImage(image.id)"
      >
        <lucide-angular
          [img]="trashIcon"
          [size]="17"
          [strokeWidth]="2.3"
        ></lucide-angular>
      </button>
    </article>
  </section>

  <ng-template #emptyState>
    <div class="empty-state">
      No hay imágenes agregadas todavía. Puede continuar al siguiente paso.
    </div>
  </ng-template>
</div>
