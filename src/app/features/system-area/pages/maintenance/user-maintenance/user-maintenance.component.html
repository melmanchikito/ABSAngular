<section class="user-page page-shell">
  <app-page-header
    [title]="pageHeader.title"
    [subtitle]="pageHeader.subtitle || ''"
    [eyebrow]="pageHeader.eyebrow || ''"
    [icon]="pageHeader.icon || null"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button
          type="button"
          class="btn-outline app-grid-filter-trigger app-grid-icon-button"
          [class.active]="filtersOpen() || isFilterActive()"
          title="Filtros"
          aria-label="Abrir filtros"
          (click)="toggleFilters($event)"
        >
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>

        <section class="app-grid-filter-panel" *ngIf="filtersOpen()" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>

          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select
              [value]="statusFilterDraft()"
              (change)="updateStatusFilterDraft($any($event.target).value)"
            >
              <option *ngFor="let option of statusFilterOptions" [value]="option.value">
                {{ option.label }}
              </option>
            </select>
          </label>

          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>

      <button
        type="button"
        class="btn-primary app-grid-icon-button"
        title="Nuevo"
        aria-label="Nuevo"
        routerLink="create"
      >
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div
    *ngIf="toast() as notification"
    class="toast-message"
    [class.toast-success]="notification.type === 'success'"
    [class.toast-error]="notification.type === 'error'"
  >
    {{ notification.message }}
  </div>

  <section class="content-grid">
    <article class="user-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Usuarios</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            #userSearch
            type="search"
            [value]="searchTerm()"
            (input)="updateSearchTerm(userSearch.value)"
            placeholder="Buscar por usuario, nombre, email o identificacion..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadUsers()"
          [disabled]="isLoading()"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="user-table app-table app-grid-table">
          <thead>
            <tr>
              <th
                *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
                [class]="getColumnClass(column)"
                [style.width]="column.width || null"
              >
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading()">
              <td [attr.colspan]="gridColumns.length">
                <div class="app-grid-skeleton" aria-label="Cargando usuarios">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </td>
            </tr>

            <tr *ngIf="!isLoading() && !users().length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No existen usuarios registrados."
                  [icon]="userIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading() && users().length && !filteredUsers().length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron usuarios con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let user of paginatedUsers(); trackBy: trackByUserId"
              class="user-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedUserId() === user.id"
              (click)="selectUser(user)"
            >
              <td
                *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
                [class]="getColumnClass(column)"
              >
                <ng-container [ngSwitch]="column.key">
                  <span *ngSwitchCase="'id'">{{ user.id }}</span>

                  <div *ngSwitchCase="'name'" class="user-name">
                    <strong>{{ getFullName(user) }}</strong>
                  </div>

                  <span *ngSwitchCase="'email'">{{ user.email }}</span>

                  <app-status-badge
                    *ngSwitchCase="'state'"
                    [label]="getStateLabel(user)"
                    [variant]="getStateVariant(user)"
                  ></app-status-badge>

                  <span *ngSwitchCase="'created_at'">{{ formatDate(user.created_at) }}</span>
                  <span *ngSwitchCase="'updated_at'">{{ formatDate(user.updated_at) }}</span>
                  <span *ngSwitchCase="'canceled_at'">{{ formatDate(user.canceled_at) }}</span>

                  <app-status-badge
                    *ngSwitchCase="'canceled'"
                    [label]="user.canceled ? 'Si' : 'No'"
                    [variant]="user.canceled ? 'inactive' : 'active'"
                  ></app-status-badge>

                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                    <button
                      type="button"
                      class="btn-icon"
                      title="Ver detalle"
                      aria-label="Ver detalle"
                      (click)="$event.stopPropagation(); selectUser(user)"
                    >
                      <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="btn-icon"
                      title="Editar usuario"
                      aria-label="Editar usuario"
                      [routerLink]="['edit', user.id]" (click)="$event.stopPropagation()"
                    >
                      <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="btn-icon icon-danger"
                      title="Anular usuario"
                      aria-label="Anular usuario"
                      [disabled]="!isUserActive(user)"
                      (click)="$event.stopPropagation(); askCancel(user)"
                    >
                      <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>
                  </div>

                  <span *ngSwitchDefault>{{ formatGridValue(user, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount()"
        [totalItems]="filteredUsers().length"
        itemLabel="usuarios"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>

    
  </section>


  <app-confirm-dialog
    [open]="!!userToCancel()"
    title="Anular usuario"
    [message]="cancelUserMessage()"
    confirmLabel="Anular"
    [loading]="isSaving()"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
