<div class="fondo">
  <section class="newpass_form">
    <div class="card_form">
      <div class="newpass_img">
        <img
          class="img"
          src="assets/auth/LogoAR.svg"
          alt="Logo ABS"
        />
      </div>

      <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="tittle">
          <h1>NUEVA CONTRASEÑA</h1>
          <p>Por favor, ingrese su nueva contraseña</p>
        </div>

        <div class="card_auth">
          <div class="alert error" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>

          <div class="alert info" *ngIf="infoMessage">
            {{ infoMessage }}
          </div>

          <div class="card_password">
            <label class="card_label" for="password">Contraseña:</label>
            <input
              id="password"
              type="password"
              placeholder="Contraseña"
              autocomplete="new-password"
              formControlName="password"
            />
          </div>

          <div class="card_password">
            <label class="card_label" for="passwordConfirmation">Confirmar Contraseña:</label>
            <input
              id="passwordConfirmation"
              type="password"
              placeholder="Confirmar contraseña"
              autocomplete="new-password"
              formControlName="passwordConfirmation"
            />
          </div>

          <div class="card_button">
            <button class="botonnewpass" type="submit">
              Confirmar
            </button>
          </div>

          <div class="card_button secondary">
            <button class="botonsecondary" type="button" (click)="goBack()">
              Volver al login
            </button>
          </div>
        </div>
      </form>
    </div>
  </section>
</div>
