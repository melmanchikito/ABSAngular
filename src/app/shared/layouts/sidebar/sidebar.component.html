<section class="card" [class.collapsed]="collapsed">
  <div class="card_image">
    <img [src]="sidebarLogoSrc" alt="Logo ABS" class="logo" />
  </div>

  <div class="card_options">
    <nav>
      <ul>
        <ng-container *ngFor="let area of areas">
          <li
            class="item"
            [class.active]="activeArea === area.name"
            (click)="toggleArea(area)"
            [title]="collapsed ? (area.translationKey | translate) : ''"
          >
            <lucide-angular
              class="icon"
              [img]="area.icon"
              [size]="18"
              [strokeWidth]="2.2"
            ></lucide-angular>
            <span class="item-text">{{ area.translationKey | translate }}</span>

            <lucide-angular
              class="arrow"
              *ngIf="area.children.length && !collapsed"
              [class.open]="expandedArea === area.name"
              [img]="chevronRightIcon"
              [size]="16"
              [strokeWidth]="2.4"
            ></lucide-angular>
          </li>

          <div
            class="submenu"
            *ngIf="area.children.length && !collapsed"
            [class.open]="expandedArea === area.name"
            [style.max-height.px]="expandedArea === area.name ? area.children.length * 38 + 36 : 0"
            [attr.aria-hidden]="expandedArea === area.name ? 'false' : 'true'"
          >
            <button
              type="button"
              class="submenu-item"
              *ngFor="let child of area.children"
              [class.submenu-active]="activeChild === child.label"
              [tabIndex]="expandedArea === area.name ? 0 : -1"
              (click)="selectChild(area, child)"
            >
              <span class="submenu-dot"></span>
              <span>{{ child.translationKey | translate }}</span>
            </button>
          </div>
        </ng-container>

        <li class="separator"></li>

        <li
          class="item"
          [class.active]="activeArea === 'Correo'"
          (click)="goToMail()"
          [title]="collapsed ? ('COMMON.MAIL' | translate) : ''"
        >
          <lucide-angular
            class="icon"
            [img]="mailIcon"
            [size]="18"
            [strokeWidth]="2.2"
          ></lucide-angular>
          <span class="item-text">{{ 'COMMON.MAIL' | translate }}</span>
        </li>

        <li
          class="item"
          (click)="logout()"
          [title]="collapsed ? ('COMMON.LOGOUT' | translate) : ''"
        >
          <lucide-angular
            class="icon"
            [img]="logoutIcon"
            [size]="18"
            [strokeWidth]="2.2"
          ></lucide-angular>
          <span class="item-text">{{ 'COMMON.LOGOUT' | translate }}</span>
        </li>
      </ul>
    </nav>
  </div>
</section>
