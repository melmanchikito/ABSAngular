<div class="fondo">
  <header class="cardpages">
    <button
      *ngFor="let step of steps; let i = index"
      class="stepButton"
      [class.active]="activeStep === i"
      [class.completed]="i < activeStep"
      [disabled]="!isStepEnabled(i)"
      (click)="setStep(i)"
    >
      <lucide-angular
        class="stepIcon"
        [img]="step.icon"
        [size]="20"
        [strokeWidth]="2.3"
      ></lucide-angular>
      <span>{{ step.label }}</span>
    </button>
  </header>

  <div class="step-alert" *ngIf="validationMessage">
    {{ validationMessage }}
  </div>

  <ng-content></ng-content>

  <div class="footerNav">
    <div>
      <button
        class="navButton"
        (click)="prevStep()"
        [disabled]="activeStep === 0"
      >
        Volver
      </button>
    </div>

    <div class="dots">
      <span
        *ngFor="let step of steps; let i = index"
        class="dot"
        [class.dotActive]="activeStep === i"
      ></span>
    </div>

    <div>
      <button
        class="navButton"
        (click)="nextStep()"
        [disabled]="activeStep === steps.length - 1 || !canGoNext"
      >
        Siguiente
      </button>
    </div>
  </div>
</div>
