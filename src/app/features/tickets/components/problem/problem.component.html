<div class="card">
  <div class="card_tittle">
    <span>⚠️</span>
    <h1>Registro de problema</h1>
  </div>

  <div class="loading-box" *ngIf="isLoading">
    Cargando categorías y problemas...
  </div>

  <div class="loading-box error-box" *ngIf="!isLoading && loadError">
    {{ loadError }}
  </div>

  <form class="form" *ngIf="!isLoading && !loadError">
    <div class="row">
      <div class="options">
        <label for="category">Categoría:</label>

        <select
          id="category"
          name="category"
          [ngModel]="form.selectedCategory?.id || ''"
          (ngModelChange)="onCategoryChange($event)"
          required
        >
          <option value="" disabled>Seleccione una categoría</option>

          <option *ngFor="let item of categories" [value]="item.id">
            {{ item.code }} - {{ item.name }}
          </option>
        </select>
      </div>

      <div class="options">
        <label for="problem">Problema:</label>

        <select
          id="problem"
          name="problem"
          [ngModel]="form.selectedProblem?.id || ''"
          (ngModelChange)="onProblemChange($event)"
          [disabled]="!categoryId"
          required
        >
          <option value="" disabled>
            {{ categoryId ? 'Seleccione un problema' : 'Seleccione una categoría primero' }}
          </option>

          <option *ngFor="let item of filteredProblems" [value]="item.id">
            {{ item.code }} - {{ item.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="options">
      <label for="description">Descripción:</label>

      <div class="textareaWrapper">
        <textarea
          id="description"
          name="issue_description"
          class="inputper"
          maxlength="255"
          placeholder="Ingrese una descripción detallada del problema"
          [ngModel]="form.selectedTicketDt?.issue_description || ''"
          (ngModelChange)="onTextChange('issue_description', $event)"
          required
        ></textarea>

        <span class="helperText">
          {{ form.charCount.issue_description || 0 }}/255
        </span>
      </div>
    </div>

    <div class="options">
      <label for="solution">Detalle de la solución:</label>

      <div class="textareaWrapper">
        <textarea
          id="solution"
          name="solution_description"
          class="inputper"
          maxlength="255"
          placeholder="Describa la solución brindada al usuario"
          [ngModel]="form.selectedTicketDt?.solution_description || ''"
          (ngModelChange)="onTextChange('solution_description', $event)"
          required
        ></textarea>

        <span class="helperText">
          {{ form.charCount.solution_description || 0 }}/255
        </span>
      </div>
    </div>

    <div class="row">
      <div class="options">
        <label for="observation">Observación:</label>

        <div class="textareaWrapper">
          <textarea
            id="observation"
            name="observation"
            class="inputper"
            maxlength="255"
            placeholder="Agregue observaciones o comentarios relevantes"
            [ngModel]="form.selectedTicketDt?.observation || ''"
            (ngModelChange)="onTextChange('observation', $event)"
            required
          ></textarea>

          <span class="helperText">
            {{ form.charCount.observation || 0 }}/255
          </span>
        </div>
      </div>

      <div class="utils">
        <div class="card_chk">
          <label for="remote">Atención remota:</label>

          <input
            id="remote"
            type="checkbox"
            name="is_remote"
            [ngModel]="form.selectedTicketDt?.is_remote || false"
            (ngModelChange)="onRemoteChange($event)"
          />
        </div>
      </div>
    </div>
  </form>
</div>
