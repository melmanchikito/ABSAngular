<footer class="data-grid-pagination app-grid-footer">
  <p class="pagination-count app-grid-count">
    {{ rangeLabel }}
  </p>

  <nav class="pagination-actions app-grid-pagination" aria-label="Paginacion del listado">
    <button
      type="button"
      class="pagination-btn pagination-edge"
      title="Primera pagina"
      aria-label="Primera pagina"
      [disabled]="isFirstPage"
      (click)="goToFirst()"
    >
      &laquo;
    </button>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      title="Pagina anterior"
      aria-label="Pagina anterior"
      [disabled]="isFirstPage"
      (click)="goToPrevious()"
    >
      &lsaquo;
    </button>

    <ng-container *ngFor="let item of paginationItems; trackBy: trackByPaginationItem">
      <button
        *ngIf="item.type === 'page'; else paginationEllipsis"
        type="button"
        class="pagination-btn pagination-page"
        [class.active]="item.page === safeCurrentPage"
        [attr.aria-current]="item.page === safeCurrentPage ? 'page' : null"
        [attr.aria-label]="'Pagina ' + item.page"
        (click)="goToPage(item.page)"
      >
        {{ item.page }}
      </button>

      <ng-template #paginationEllipsis>
        <span class="pagination-ellipsis" aria-hidden="true">...</span>
      </ng-template>
    </ng-container>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      title="Pagina siguiente"
      aria-label="Pagina siguiente"
      [disabled]="isLastPage"
      (click)="goToNext()"
    >
      &rsaquo;
    </button>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      title="Ultima pagina"
      aria-label="Ultima pagina"
      [disabled]="isLastPage"
      (click)="goToLast()"
    >
      &raquo;
    </button>
  </nav>
</footer>
