<section class="system-page page-shell non-operational-page visual-page-background">
  <div class="page-header">
    <div class="page-title">
      <div class="title-row">
        <span class="title-icon">
          <lucide-angular [img]="pageIcon" [size]="22" [strokeWidth]="2.3"></lucide-angular>
        </span>
        <div>
          <h1>{{ area.title }}</h1>
          <span class="submodule-label" *ngIf="submodule">
            Submodulo: {{ submodule.label }}
          </span>
        </div>
      </div>
      <p>{{ pageSubtitle }}</p>
    </div>
  </div>

  <div class="section-buttons">
    <button
      *ngFor="let category of categories"
      type="button"
      class="section-btn"
      [class.active]="activeCategory === category.key"
      (click)="selectCategory(category)"
    >
      <span class="section-icon">
        <lucide-angular [img]="category.icon" [size]="20" [strokeWidth]="2.3"></lucide-angular>
      </span>

      <span class="section-info">
        <strong>{{ category.label }}</strong>
        <small>{{ category.description }}</small>
      </span>
    </button>
  </div>

  <div class="content-card app-card">
    <div class="content-header">
      <div>
        <h2>{{ activeCategoryConfig.label }}</h2>
        <p>{{ activeCategoryConfig.description }}</p>
      </div>

      <span class="counter">
        {{ activeOptions.length }} opciones
      </span>
    </div>

    <div class="options-grid" *ngIf="activeOptions.length; else emptyState">
      <button
        *ngFor="let option of activeOptions"
        type="button"
        class="option-card"
        [class.option-card-link]="option.route"
        (click)="selectOption(option)"
      >
        <span class="option-icon">
          <lucide-angular [img]="option.icon" [size]="19" [strokeWidth]="2.3"></lucide-angular>
        </span>

        <span class="option-content">
          <strong>{{ option.label }}</strong>
          <small>{{ option.description }}</small>
        </span>

        <span class="option-arrow">&rsaquo;</span>
      </button>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">
        No hay opciones configuradas para esta categoria.
      </div>
    </ng-template>
  </div>
</section>
