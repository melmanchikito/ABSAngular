<section class="company-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Empresas"
    subtitle="Administra las empresas registradas en el sistema."
    [icon]="buildingIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button
          type="button"
          class="btn-outline app-grid-filter-trigger app-grid-icon-button"
          [class.active]="filtersOpen || statusFilter !== 'all'"
          title="Filtros"
          aria-label="Abrir filtros"
          (click)="toggleFilters($event)"
        >
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>

        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>
          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>
          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>

      <button
        type="button"
        class="primary-btn btn-primary app-grid-icon-button"
        title="Nuevo"
        aria-label="Nuevo"
        routerLink="create"
      >
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="message success alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="message error alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="table-card app-card app-grid-card">
    <header class="app-grid-header">
      <div class="app-grid-title">
        <span class="app-grid-eyebrow">Listado</span>
        <h2 class="app-grid-heading">Empresas</h2>
      </div>
    </header>

    <div class="app-grid-toolbar">
      <label class="app-grid-search">
        <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
        <input
          type="search"
          name="companySearch"
          [ngModel]="searchTerm"
          appDebouncedSearch
          (debouncedSearch)="searchTerm = $event; onFiltersChange()"
          placeholder="Buscar empresa..."
          autocomplete="off"
        />
      </label>

      <button
        type="button"
        class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
        title="Actualizar"
        aria-label="Actualizar listado"
        (click)="loadCompanies()"
        [disabled]="isLoading"
      >
        <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
      </button>
    </div>

    <div class="app-grid-table-wrapper">
      <table class="company-table app-table app-grid-table">
        <thead>
          <tr>
            <th
              *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
              [class]="getColumnClass(column)"
              [style.width]="column.width || null"
            >
              {{ column.label }}
            </th>
          </tr>
        </thead>

        <tbody>
          <tr *ngIf="isLoading">
            <td [attr.colspan]="gridColumns.length" class="table-state">Cargando empresas...</td>
          </tr>

          <tr *ngIf="!isLoading && !companies.length">
            <td [attr.colspan]="gridColumns.length" class="table-state">No existen empresas registradas.</td>
          </tr>

          <tr *ngIf="!isLoading && companies.length && !filteredCompanies.length">
            <td [attr.colspan]="gridColumns.length" class="table-state">No se encontraron empresas con los filtros aplicados.</td>
          </tr>

          <tr
            *ngFor="let company of paginatedCompanies; trackBy: trackByCompanyId"
            class="app-grid-row-clickable"
            [class.app-grid-row-selected]="selectedCompanyId === company.id"
            (click)="selectCompany(company)"
          >
            <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
              <ng-container [ngSwitch]="column.key">
                <app-status-badge
                  *ngSwitchCase="'canceled'"
                  [label]="company.canceled ? 'Inactiva' : 'Activa'"
                  [variant]="company.canceled ? 'inactive' : 'active'"
                ></app-status-badge>

                <div *ngSwitchCase="'actions'" class="app-grid-actions">
                <button
                  type="button"
                  class="icon-action btn-icon"
                  title="Ver empresa"
                  aria-label="Ver empresa"
                  (click)="$event.stopPropagation(); selectCompany(company)"
                >
                  <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                </button>

                <button
                  type="button"
                  class="icon-action btn-icon"
                  title="Editar empresa"
                  aria-label="Editar empresa"
                  [routerLink]="['edit', company.id]" (click)="$event.stopPropagation()"
                >
                  <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                </button>

                <button
                  type="button"
                  class="icon-action danger btn-icon"
                  title="Borrar empresa"
                  aria-label="Borrar empresa"
                  [disabled]="company.canceled"
                  (click)="$event.stopPropagation(); askCancel(company)"
                >
                  <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                </button>
                </div>

                <span *ngSwitchDefault>{{ formatGridValue(company, column.key) }}</span>
              </ng-container>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <app-data-grid-pagination
      [showing]="showingCount"
      [pageSize]="pageSize"
      [totalItems]="filteredCompanies.length"
      itemLabel="empresas"
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="setPage($event)"
    ></app-data-grid-pagination>
  </section>


  <app-confirm-dialog
    [open]="!!companyToCancel"
    title="Anular empresa"
    [message]="cancelCompanyMessage"
    confirmLabel="Anular empresa"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
