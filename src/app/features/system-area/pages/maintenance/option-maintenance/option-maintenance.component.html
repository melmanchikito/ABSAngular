<section class="option-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Opciones"
    subtitle="Administra las opciones disponibles por modulo y tipo."
    [icon]="optionIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button
          type="button"
          class="btn-outline app-grid-filter-trigger app-grid-icon-button"
          [class.active]="filtersOpen || statusFilter !== 'all' || selectedModuleFilter !== 'all' || selectedTypeFilter !== 'all'"
          title="Filtros"
          aria-label="Abrir filtros"
          (click)="toggleFilters($event)"
        >
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>

        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>

          <label class="app-grid-filter-field">
            <span>Modulo</span>
            <select [(ngModel)]="selectedModuleFilterDraft">
              <option value="all">Todos los modulos</option>
              <option *ngFor="let module of modules; trackBy: trackByModuleId" [ngValue]="module.id">
                {{ module.name }}
              </option>
            </select>
          </label>

          <label class="app-grid-filter-field">
            <span>Tipo</span>
            <select [(ngModel)]="selectedTypeFilterDraft">
              <option value="all">Todos los tipos</option>
              <option *ngFor="let type of optionTypes; trackBy: trackByTypeId" [ngValue]="type.id">
                {{ type.name }}
              </option>
            </select>
          </label>

          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>

          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>

      <button
        type="button"
        class="primary-btn btn-primary app-grid-icon-button"
        title="Nuevo"
        aria-label="Nuevo registro"
        routerLink="create"
      >
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="content-grid">
    <article class="options-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Opciones</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            type="search"
            name="optionSearch"
            [(ngModel)]="searchTerm"
            (ngModelChange)="onFiltersChange()"
            placeholder="Buscar por codigo, nombre, modulo o tipo..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadOptions()"
          [disabled]="isLoading"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="option-table app-table app-grid-table">
          <thead>
            <tr>
              <th
                *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
                [class]="getColumnClass(column)"
                [style.width]="column.width || null"
              >
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="Cargando opciones..." [icon]="optionIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && !options.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="No existen opciones registradas." [icon]="optionIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && options.length && !filteredOptions.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron opciones con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let option of paginatedOptions; trackBy: trackByOptionId"
              class="option-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedOptionId === option.id"
              (click)="selectOption(option)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <span *ngSwitchCase="'code'" class="code-badge">{{ option.code }}</span>
                  <div *ngSwitchCase="'name'" class="option-name">
                    <strong>{{ option.name }}</strong>
                  </div>
                  <app-status-badge
                    *ngSwitchCase="'canceled'"
                    [label]="option.canceled ? 'Inactiva' : 'Activa'"
                    [variant]="option.canceled ? 'inactive' : 'active'"
                  ></app-status-badge>
                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                    <button
                      type="button"
                      class="icon-action btn-icon"
                      title="Ver opcion"
                      aria-label="Ver opcion"
                      (click)="$event.stopPropagation(); selectOption(option)"
                    >
                      <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="icon-action btn-icon"
                      title="Editar opcion"
                      aria-label="Editar opcion"
                      [routerLink]="['edit', option.id]" (click)="$event.stopPropagation()"
                    >
                      <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="icon-action danger btn-icon"
                      title="Borrar opcion"
                      aria-label="Borrar opcion"
                      [disabled]="option.canceled"
                      (click)="$event.stopPropagation(); askCancel(option)"
                    >
                      <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>
                  </div>
                  <span *ngSwitchDefault>{{ formatGridValue(option, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount"
        [totalItems]="filteredOptions.length"
        itemLabel="opciones"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>
  </section>


  <app-confirm-dialog
    [open]="!!optionToCancel"
    title="Anular opcion"
    [message]="cancelOptionMessage"
    confirmLabel="Anular opcion"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
