<div class="card">
  <div class="card_tittle">
    <span>👔</span>
    <h1>Datos del solicitante</h1>
  </div>

  <div class="loading-box" *ngIf="isLoading">
    Cargando datos del solicitante...
  </div>

  <div class="loading-box error-box" *ngIf="!isLoading && loadError">
    {{ loadError }}
  </div>

  <form class="form" *ngIf="!isLoading && !loadError">
    <div class="card_options">
      <label for="dateInit">Fecha y hora de creación:</label>
      <input
        id="dateInit"
        type="datetime-local"
        [ngModel]="form.dateInit"
        (ngModelChange)="handleChange('dateInit', $event)"
        name="dateInit"
      />
      <label class="alert" *ngIf="alertStart">{{ alertStart }}</label>
    </div>

    <div class="card_options">
      <label for="dateEnd">Fecha y hora de cierre:</label>
      <input
        id="dateEnd"
        type="datetime-local"
        [ngModel]="form.dateEnd"
        (ngModelChange)="handleChange('dateEnd', $event)"
        name="dateEnd"
      />
      <label class="alert" *ngIf="alertEnd">{{ alertEnd }}</label>
    </div>

    <div class="card_options">
      <label for="employee">Empleado:</label>
      <select
        id="employee"
        [ngModel]="form.employeeId || ''"
        (ngModelChange)="handleChange('employeeId', $event)"
        name="employee"
      >
        <option value="" disabled>Seleccione un empleado</option>
        <option *ngFor="let item of filteredEmployees" [value]="item.id">
          {{ item.code }} - {{ item.name }}
        </option>
      </select>
    </div>

    <div class="card_options">
      <label for="company">Compañía:</label>
      <select
        id="company"
        [ngModel]="form.companyId || ''"
        (ngModelChange)="handleChange('companyId', $event)"
        name="company"
      >
        <option value="" disabled>Seleccione una compañía</option>
        <option *ngFor="let item of filteredCompanies" [value]="item.id">
          {{ item.code }} - {{ item.name }}
        </option>
      </select>
    </div>

    <div class="card_options">
      <label for="branch">Sucursal:</label>
      <select
        id="branch"
        [ngModel]="form.branchId || ''"
        (ngModelChange)="handleChange('branchId', $event)"
        name="branch"
      >
        <option value="" disabled>Seleccione una sucursal</option>
        <option *ngFor="let item of filteredBranches" [value]="item.id">
          {{ item.code }} - {{ item.name }}
        </option>
      </select>
    </div>

    <div class="card_options">
      <label for="department">Departamento:</label>
      <select
        id="department"
        [ngModel]="form.departmentId || ''"
        (ngModelChange)="handleChange('departmentId', $event)"
        name="department"
      >
        <option value="" disabled>Seleccione un departamento</option>
        <option *ngFor="let item of filteredDepartments" [value]="item.id">
          {{ item.code }} - {{ item.name }}
        </option>
      </select>
    </div>

    <div class="card_options">
      <label for="priority">Prioridad:</label>
      <select
        id="priority"
        [ngModel]="form.priority || ''"
        (ngModelChange)="handleChange('priority', $event)"
        name="priority"
      >
        <option value="" disabled>Seleccione la prioridad</option>
        <option value="1">Baja</option>
        <option value="2">Moderada</option>
        <option value="3">Alta</option>
        <option value="4">Urgente</option>
      </select>
    </div>

    <div class="card_chk">
      <label for="isOwner">¿Es dueño del equipo?</label>
      <input
        id="isOwner"
        type="checkbox"
        [ngModel]="form.isOwner"
        (ngModelChange)="handleChange('isOwner', $event)"
        name="isOwner"
      />
    </div>

    <div class="card_options" *ngIf="!form.isOwner">
      <label for="owner">Dueño del equipo:</label>
      <select
        id="owner"
        [ngModel]="form.ownerId || ''"
        (ngModelChange)="handleChange('ownerId', $event)"
        name="owner"
      >
        <option value="" disabled>Seleccione al dueño del equipo</option>
        <option *ngFor="let item of ownerOptions" [value]="item.id">
          {{ item.code }} - {{ item.name }}
        </option>
      </select>
    </div>
  </form>
</div>
