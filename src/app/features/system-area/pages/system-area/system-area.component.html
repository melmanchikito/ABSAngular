<section class="system-page page-shell non-operational-page visual-page-background">
  <div class="page-header">
    <div class="page-title">
      <div class="title-row">
        <span class="title-icon">
          <lucide-angular [img]="pageIcon" [size]="22" [strokeWidth]="2.3"></lucide-angular>
        </span>
        <div>
          <h1>{{ area.title }}</h1>
          <nav class="page-breadcrumb" aria-label="Ruta de pagina">
            <ng-container *ngFor="let part of pageBreadcrumb; let last = last">
              <span [class.current]="last">{{ part }}</span>
            </ng-container>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <div class="section-buttons">
    <button
      *ngFor="let category of categories; trackBy: trackCategory"
      type="button"
      class="section-btn"
      [class.active]="activeCategory === category.key"
      (click)="selectCategory(category)"
    >
      <span class="section-icon">
        <lucide-angular [img]="category.icon" [size]="20" [strokeWidth]="2.3"></lucide-angular>
      </span>

      <span class="section-info">
        <strong>{{ category.label }}</strong>
        <small>{{ category.description }}</small>
      </span>
    </button>
  </div>

  <div
    #contentCard
    class="content-card app-card"
    [class.category-exiting]="isCategoryExiting"
    [class.category-entering]="isCategoryEntering"
    [attr.data-motion-cycle]="contentAnimationCycle"
    [style.min-height.px]="contentMinHeight || null"
  >
    <div class="content-header">
      <div>
        <h2>{{ activeCategoryConfig.label }}</h2>
        <p>{{ activeCategoryConfig.description }}</p>
      </div>

      <span class="counter">
        {{ activeOptionCards.length }} opciones
      </span>
    </div>

    <div class="options-grid" *ngIf="activeOptionCards.length; else emptyState">
      <button
        *ngFor="let optionCard of activeOptionCards; trackBy: trackOptionCard"
        type="button"
        class="option-card"
        [class.option-card-link]="optionCard.option.route"
        [style.animation-delay.ms]="optionCard.animationDelay"
        (click)="selectOption(optionCard.option)"
      >
        <span class="option-icon">
          <lucide-angular [img]="optionCard.option.icon" [size]="19" [strokeWidth]="2.3"></lucide-angular>
        </span>

        <span class="option-content">
          <strong>{{ optionCard.option.label }}</strong>
          <small>{{ optionCard.option.description }}</small>
        </span>

        <span class="option-arrow">&rsaquo;</span>
      </button>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">
        No hay opciones configuradas para esta categoria.
      </div>
    </ng-template>
  </div>
</section>
