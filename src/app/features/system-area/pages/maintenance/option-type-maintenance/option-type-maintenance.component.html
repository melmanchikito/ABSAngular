<section class="option-type-page page-shell">
  <app-page-header
    eyebrow="Configuracion"
    title="Mantenimiento - Tipo de opciones"
    subtitle="Administra la clasificacion de opciones disponibles en el sistema."
    [icon]="optionTypeIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button type="button" class="btn-outline app-grid-filter-trigger app-grid-icon-button" [class.active]="filtersOpen() || statusFilter() !== 'all'" title="Filtros" aria-label="Abrir filtros" (click)="toggleFilters($event)">
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>
        <section class="app-grid-filter-panel" *ngIf="filtersOpen()" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>
          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [value]="statusFilterDraft()" (change)="updateStatusFilterDraft($any($event.target).value)">
              <option *ngFor="let option of statusFilterOptions" [value]="option.value">{{ option.label }}</option>
            </select>
          </label>
          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>
      <button type="button" class="btn-primary app-grid-icon-button" title="Nuevo" aria-label="Nuevo registro" routerLink="create">
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div
    *ngIf="toast() as notification"
    class="toast-message"
    [class.toast-success]="notification.type === 'success'"
    [class.toast-error]="notification.type === 'error'"
  >
    {{ notification.message }}
  </div>

  <section class="content-grid">
    <article class="option-type-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Tipos de opcion</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            #optionTypeSearch
            type="search"
            [value]="searchTerm()"
            (input)="updateSearchTerm(optionTypeSearch.value)"
            placeholder="Buscar por codigo o nombre..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadOptionTypes()"
          [disabled]="isLoading()"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="option-type-table app-table app-grid-table">
          <thead>
            <tr>
              <th *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)" [style.width]="column.width || null">
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading()">
              <td [attr.colspan]="gridColumns.length">
                <div class="app-grid-skeleton" aria-label="Cargando tipos de opcion">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </td>
            </tr>

            <tr *ngIf="!isLoading() && !optionTypes().length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No existen tipos de opcion registrados."
                  [icon]="optionTypeIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading() && optionTypes().length && !filteredOptionTypes().length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron tipos de opcion con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let optionType of paginatedOptionTypes(); trackBy: trackByOptionTypeId"
              class="option-type-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedOptionTypeId() === optionType.id"
              (click)="selectOptionType(optionType)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <app-status-badge *ngSwitchCase="'canceled'" [label]="optionType.canceled ? 'Inactivo' : 'Activo'" [variant]="optionType.canceled ? 'inactive' : 'active'"></app-status-badge>
                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                  <button
                    type="button"
                    class="btn-icon"
                    title="Ver tipo de opcion"
                    aria-label="Ver tipo de opcion"
                    (click)="$event.stopPropagation(); selectOptionType(optionType)"
                  >
                    <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="btn-icon"
                    title="Editar tipo de opcion"
                    aria-label="Editar tipo de opcion"
                    [routerLink]="['edit', optionType.id]" (click)="$event.stopPropagation()"
                  >
                    <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="btn-icon icon-danger"
                    title="Anular tipo de opcion"
                    aria-label="Anular tipo de opcion"
                    [disabled]="optionType.canceled"
                    (click)="$event.stopPropagation(); askCancel(optionType)"
                  >
                    <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>
                  </div>
                  <span *ngSwitchDefault>{{ formatGridValue(optionType, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount()"
        [totalItems]="filteredOptionTypes().length"
        itemLabel="tipos"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>
  </section>


  <app-confirm-dialog
    [open]="!!optionTypeToCancel()"
    title="Anular tipo de opcion"
    [message]="cancelOptionTypeMessage()"
    confirmLabel="Anular"
    [loading]="isSaving()"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
