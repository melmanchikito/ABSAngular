<header class="page-header">
  <div class="page-title">
    <div class="title-row">
      <span class="title-icon" *ngIf="icon">
        <lucide-angular [img]="icon" [size]="22" [strokeWidth]="2.3"></lucide-angular>
      </span>

      <div>
        <h1>{{ title }}</h1>
        <nav class="page-breadcrumb" *ngIf="breadcrumbParts.length" aria-label="Ruta de pagina">
          <ng-container *ngFor="let part of breadcrumbParts; let last = last">
            <span [class.current]="last">{{ part }}</span>
          </ng-container>
        </nav>
      </div>
    </div>
  </div>

  <ng-content select="[page-actions]"></ng-content>
</header>
