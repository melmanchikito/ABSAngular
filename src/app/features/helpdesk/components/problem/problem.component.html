<div class="card">
  <div class="card_tittle">
    <span>⚠️</span>
    <h1>Registro de problema</h1>
  </div>

  <form class="form">
    <div class="row">
      <div class="options">
        <label for="category">Categoría:</label>
        <select
          id="category"
          [ngModel]="form.selectedCategory?.id"
          (ngModelChange)="onCategoryChange(+$event)"
          name="category"
        >
          <option [ngValue]="undefined" disabled>Seleccione una categoría</option>
          <option *ngFor="let item of categories" [ngValue]="item.id">
            {{ item.code }} - {{ item.name }}
          </option>
        </select>
      </div>

      <div class="options">
        <label for="problem">Problema:</label>
        <select
          id="problem"
          [ngModel]="form.selectedProblem?.id"
          (ngModelChange)="onProblemChange(+$event)"
          name="problem"
          [disabled]="!form.selectedCategory?.id"
        >
          <option [ngValue]="undefined" disabled>
            {{ form.selectedCategory?.id ? 'Seleccione un problema' : 'Seleccione una categoría primero' }}
          </option>
          <option *ngFor="let item of filteredProblems" [ngValue]="item.id">
            {{ item.code }} - {{ item.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="options">
      <label for="description">Descripción:</label>
      <div class="textareaWrapper">
        <textarea
          id="description"
          class="inputper"
          maxlength="255"
          [ngModel]="form.selectedTicketDt?.issue_description"
          (ngModelChange)="onTextChange('issue_description', $event)"
          name="issue_description"
        ></textarea>
        <span class="helperText">{{ form.charCount.issue_description }}/255</span>
      </div>
    </div>

    <div class="options">
      <label for="solution">Detalle de la solución:</label>
      <div class="textareaWrapper">
        <textarea
          id="solution"
          class="inputper"
          maxlength="255"
          [ngModel]="form.selectedTicketDt?.solution_description"
          (ngModelChange)="onTextChange('solution_description', $event)"
          name="solution_description"
        ></textarea>
        <span class="helperText">{{ form.charCount.solution_description }}/255</span>
      </div>
    </div>

    <div class="row">
      <div class="options">
        <label for="observation">Observación:</label>
        <div class="textareaWrapper">
          <textarea
            id="observation"
            class="inputper"
            maxlength="255"
            [ngModel]="form.selectedTicketDt?.observation"
            (ngModelChange)="onTextChange('observation', $event)"
            name="observation"
          ></textarea>
          <span class="helperText">{{ form.charCount.observation }}/255</span>
        </div>
      </div>

      <div class="utils">
        <div class="card_chk">
          <label for="remote">Atención remota:</label>
          <input
            id="remote"
            type="checkbox"
            [ngModel]="form.selectedTicketDt?.is_remote"
            (ngModelChange)="onRemoteChange($event)"
            name="is_remote"
          />
        </div>
      </div>
    </div>
  </form>
</div>
