<main class="auth-shell">
  <section class="auth-stage">
    <div class="brand-panel">
      <img class="brand-logo" src="assets/auth/LogoAR.svg" alt="Logo ABS" />
      <div class="brand-copy">
        <span>Recuperación</span>
        <h1>Validar cuenta</h1>
        <p>Usa tu correo corporativo para continuar con el proceso.</p>
      </div>
    </div>

    <section class="auth-card" aria-labelledby="recover-title">
      <div class="card-header">
        <img class="card-logo" src="assets/auth/LogoAR.svg" alt="Logo ABS" />
        <div>
          <p class="eyebrow">Seguridad</p>
          <h2 id="recover-title">Recuperar contraseña</h2>
        </div>
      </div>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="alert error" *ngIf="errorMessage">
          <lucide-angular [img]="alertIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="alert info" *ngIf="infoMessage">
          <lucide-angular [img]="infoIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ infoMessage }}</span>
        </div>

        <label class="field" for="email">
          <span>Correo corporativo</span>
          <div class="input-wrap">
            <lucide-angular class="field-icon" [img]="mailSearchIcon" [size]="18" [strokeWidth]="2.2"></lucide-angular>
            <input
              id="email"
              type="email"
              placeholder="abc@autoradiador.com"
              autocomplete="username"
              formControlName="email"
            />
          </div>
        </label>

        <div class="action-grid">
          <button type="button" class="secondary-action" (click)="goBack()">
            <lucide-angular [img]="backIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
            Cancelar
          </button>

          <button class="primary-action" type="submit" [disabled]="isSubmitting">
            <lucide-angular [img]="sendIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
            {{ isSubmitting ? 'Buscando...' : 'Buscar' }}
          </button>
        </div>
      </form>
    </section>
  </section>
</main>
