<main class="auth-shell" [class.login-success-exit]="isLoginExiting">
  <section class="auth-stage">
    <section class="auth-card" aria-labelledby="login-title">
      <div class="card-header">
        <img class="card-logo" src="assets/auth/LogoAR.svg" alt="Logo ABS" />
        <div>
          <span class="eyebrow">Acceso seguro</span>
          <h2 id="login-title">Iniciar sesion</h2>
        </div>
      </div>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="alert error" *ngIf="errorMessage">
          <lucide-angular [img]="alertIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="alert info" *ngIf="infoMessage">
          <lucide-angular [img]="infoIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ infoMessage }}</span>
        </div>

        <label class="field" for="email">
          <span>Usuario</span>
          <div class="input-wrap">
            <lucide-angular class="field-icon" [img]="mailIcon" [size]="18" [strokeWidth]="2.2"></lucide-angular>
            <input
              id="email"
              type="email"
              placeholder="abc@autoradiador.com"
              autocomplete="username"
              formControlName="email"
            />
          </div>
        </label>

        <label class="field" for="password">
          <span>Contrasena</span>
          <div class="input-wrap">
            <lucide-angular class="field-icon" [img]="lockIcon" [size]="18" [strokeWidth]="2.2"></lucide-angular>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Ingresa tu contrasena"
              autocomplete="current-password"
              formControlName="password"
              (copy)="$event.preventDefault()"
              (paste)="$event.preventDefault()"
            />
            <button
              class="icon-button"
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
            >
              <lucide-angular
                [img]="showPassword ? eyeOffIcon : eyeIcon"
                [size]="18"
                [strokeWidth]="2.2"
              ></lucide-angular>
            </button>
          </div>
        </label>

        <div class="form-row">
          <a href="#" (click)="goToRecoverPassword($event)">Olvide mi contrasena</a>
        </div>

        <button class="primary-action" type="submit" [disabled]="isSubmitting">
          <lucide-angular [img]="loginIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          {{ isSubmitting ? 'Ingresando...' : 'Iniciar sesion' }}
        </button>
      </form>
    </section>

    <aside class="brand-panel" aria-label="Presentacion ABS">
      <div class="brand-orbit" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="brand-copy">
        <span class="brand-kicker">Sistema ERP</span>
        <h1>ABS</h1>
        <h2>Sistema de Gestion Empresarial</h2>
        <p>
          Administra modulos, procesos y operaciones desde una plataforma integrada.
        </p>
        <span class="brand-badge">Conoce mas</span>
      </div>
    </aside>
  </section>
</main>
