<header class="page-header">
  <div class="page-title">
    <span class="eyebrow" *ngIf="eyebrow">{{ eyebrow }}</span>

    <div class="title-row">
      <span class="title-icon" *ngIf="icon">
        <lucide-angular [img]="icon" [size]="22" [strokeWidth]="2.3"></lucide-angular>
      </span>

      <div>
        <h1>{{ title }}</h1>
        <p *ngIf="subtitle">{{ subtitle }}</p>
      </div>
    </div>
  </div>

  <ng-content select="[page-actions]"></ng-content>
</header>
