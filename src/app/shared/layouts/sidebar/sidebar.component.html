<section class="card" [class.collapsed]="collapsed">
  <div class="card_image">
    <img src="assets/auth/LogoAR.svg" alt="Logo ABS" class="logo" />
  </div>

  <div class="card_options">
    <nav>
      <ul>
        <li
          *ngFor="let perm of permissions"
          class="item"
          [class.active]="activePerm === perm"
          (click)="onSelect(perm)"
          [title]="collapsed ? perm : ''"
        >
          <span class="icon">{{ permissionIcons[perm] || '⚙️' }}</span>
          <span class="item-text">{{ perm }}</span>
        </li>

        <li class="separator"></li>

        <li
          class="item"
          [class.active]="activePerm === 'Perfil'"
          (click)="goToProfile()"
          [title]="collapsed ? 'Perfil' : ''"
        >
          <span class="icon">👤</span>
          <span class="item-text">Perfil</span>
        </li>

        <li
          class="item"
          (click)="logout()"
          [title]="collapsed ? 'Cerrar Sesión' : ''"
        >
          <span class="icon">↩</span>
          <span class="item-text">Cerrar Sesión</span>
        </li>
      </ul>
    </nav>
  </div>
</section>
