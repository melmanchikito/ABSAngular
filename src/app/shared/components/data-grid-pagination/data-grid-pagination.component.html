<footer class="data-grid-pagination app-grid-footer">
  <p class="pagination-count app-grid-count">
    {{ 'GRID.PAGINATION_LABEL' | translate:{ first: firstVisibleRecord, last: lastVisibleRecord, total: safeTotalItems, label: (safeTotalItems === 1 ? ('GRID.RECORD' | translate) : itemLabel) } }}
  </p>

  <nav class="pagination-actions app-grid-pagination" [attr.aria-label]="'GRID.PAGINATION_LABEL' | translate:{ first: firstVisibleRecord, last: lastVisibleRecord, total: safeTotalItems, label: itemLabel }">
    <button
      type="button"
      class="pagination-btn pagination-edge"
      [title]="'GRID.FIRST_PAGE' | translate"
      [attr.aria-label]="'GRID.FIRST_PAGE' | translate"
      [disabled]="isFirstPage"
      (click)="goToFirst()"
    >
      &laquo;
    </button>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      [title]="'GRID.PREVIOUS_PAGE' | translate"
      [attr.aria-label]="'GRID.PREVIOUS_PAGE' | translate"
      [disabled]="isFirstPage"
      (click)="goToPrevious()"
    >
      &lsaquo;
    </button>

    <ng-container *ngFor="let item of paginationItems; trackBy: trackByPaginationItem">
      <button
        *ngIf="item.type === 'page'; else paginationEllipsis"
        type="button"
        class="pagination-btn pagination-page"
        [class.active]="item.page === safeCurrentPage"
        [attr.aria-current]="item.page === safeCurrentPage ? 'page' : null"
        [attr.aria-label]="'GRID.PAGE' | translate:{ page: item.page }"
        (click)="goToPage(item.page)"
      >
        {{ item.page }}
      </button>

      <ng-template #paginationEllipsis>
        <span class="pagination-ellipsis" aria-hidden="true">...</span>
      </ng-template>
    </ng-container>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      [title]="'GRID.NEXT_PAGE' | translate"
      [attr.aria-label]="'GRID.NEXT_PAGE' | translate"
      [disabled]="isLastPage"
      (click)="goToNext()"
    >
      &rsaquo;
    </button>

    <button
      type="button"
      class="pagination-btn pagination-edge"
      [title]="'GRID.LAST_PAGE' | translate"
      [attr.aria-label]="'GRID.LAST_PAGE' | translate"
      [disabled]="isLastPage"
      (click)="goToLast()"
    >
      &raquo;
    </button>
  </nav>
</footer>
