<section class="location-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Ubicaciones"
    subtitle="Administra las ubicaciones fisicas registradas en el sistema."
    [icon]="mapIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button
          type="button"
          class="btn-outline app-grid-filter-trigger app-grid-icon-button"
          [class.active]="filtersOpen || statusFilter !== 'all'"
          title="Filtros"
          aria-label="Abrir filtros"
          (click)="toggleFilters($event)"
        >
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>

        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>

          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>

          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>

      <button
        type="button"
        class="primary-btn btn-primary app-grid-icon-button"
        title="Nuevo"
        aria-label="Nuevo"
        routerLink="create"
      >
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="message success alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="message error alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="content-grid">
    <article class="list-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Ubicaciones</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            type="search"
            name="locationSearch"
            [(ngModel)]="searchTerm"
            (ngModelChange)="onFiltersChange()"
            placeholder="Buscar por codigo, nombre o direccion..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadLocations()"
          [disabled]="isLoading"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="location-table app-table app-grid-table">
          <thead>
            <tr>
              <th
                *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
                [class]="getColumnClass(column)"
                [style.width]="column.width || null"
              >
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="Cargando ubicaciones..." [icon]="mapIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && !locations.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="No existen ubicaciones registradas." [icon]="mapIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && locations.length && !filteredLocations.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron ubicaciones con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let location of paginatedLocations; trackBy: trackByLocationId"
              class="location-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedLocationId === location.id"
              (click)="selectLocation(location)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <span *ngSwitchCase="'code'" class="code-badge">{{ location.code }}</span>
                  <div *ngSwitchCase="'name'" class="location-name">
                    <strong>{{ location.name }}</strong>
                  </div>
                  <app-status-badge
                    *ngSwitchCase="'canceled'"
                    [label]="location.canceled ? 'Inactiva' : 'Activa'"
                    [variant]="location.canceled ? 'inactive' : 'active'"
                  ></app-status-badge>
                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                    <button
                      type="button"
                      class="mini-action btn-icon"
                      title="Ver ubicacion"
                      aria-label="Ver ubicacion"
                      (click)="$event.stopPropagation(); selectLocation(location)"
                    >
                      <lucide-angular [img]="detailIcon" [size]="16" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="mini-action btn-icon"
                      title="Editar ubicacion"
                      aria-label="Editar ubicacion"
                      [routerLink]="['edit', location.id]" (click)="$event.stopPropagation()"
                    >
                      <lucide-angular [img]="editIcon" [size]="16" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="mini-action danger btn-icon"
                      title="Borrar ubicacion"
                      aria-label="Borrar ubicacion"
                      [disabled]="location.canceled"
                      (click)="$event.stopPropagation(); askCancel(location)"
                    >
                      <lucide-angular [img]="trashIcon" [size]="16" [strokeWidth]="2.3"></lucide-angular>
                    </button>
                  </div>
                  <span *ngSwitchDefault>{{ formatGridValue(location, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount"
        [totalItems]="filteredLocations.length"
        itemLabel="ubicaciones"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>
  </section>

  <section class="map-section app-card" aria-label="Referencia visual de ubicaciones">
    <header class="map-header">
      <div class="map-title-group">
        <span class="eyebrow">Referencia visual</span>
        <h2>Mapa de ubicacion</h2>
      </div>
      <span class="map-note">Centro: Guayaquil</span>
    </header>

    <div class="map-frame">
      <div #locationsMap id="locationsMap" class="map-view"></div>
    </div>
  </section>


  <app-confirm-dialog
    [open]="!!locationToCancel"
    title="Anular ubicacion"
    [message]="cancelLocationMessage"
    confirmLabel="Anular ubicacion"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
