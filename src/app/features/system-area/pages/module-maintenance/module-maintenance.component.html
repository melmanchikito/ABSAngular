<section class="module-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Modulos"
    subtitle="Administra los modulos registrados en el sistema."
    [icon]="moduleIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button type="button" class="btn-outline app-grid-filter-trigger app-grid-icon-button" [class.active]="filtersOpen || statusFilter !== 'all'" title="Filtros" aria-label="Abrir filtros" (click)="toggleFilters($event)">
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>
        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>
          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>
          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>
      <button type="button" class="primary-btn btn-primary app-grid-icon-button" title="Nuevo" aria-label="Nuevo registro" (click)="openCreateModal()">
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="content-grid">
    <article class="modules-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Modulos</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            type="search"
            name="moduleSearch"
            [(ngModel)]="searchTerm"
            (ngModelChange)="onFiltersChange()"
            placeholder="Buscar por codigo, nombre u orden..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadModules()"
          [disabled]="isLoading"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="module-table app-table app-grid-table">
          <thead>
            <tr>
              <th *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)" [style.width]="column.width || null">
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="Cargando modulos..." [icon]="moduleIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && !modules.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="No existen modulos registrados." [icon]="moduleIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && modules.length && !filteredModules.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron modulos con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let module of paginatedModules; trackBy: trackByModuleId"
              class="module-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedModuleId === module.id"
              (click)="selectModule(module)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <app-status-badge *ngSwitchCase="'canceled'" [label]="module.canceled ? 'Inactivo' : 'Activo'" [variant]="module.canceled ? 'inactive' : 'active'"></app-status-badge>
                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                  <button
                    type="button"
                    class="icon-action btn-icon"
                    title="Ver modulo"
                    aria-label="Ver modulo"
                    (click)="$event.stopPropagation(); selectModule(module)"
                  >
                    <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="icon-action btn-icon"
                    title="Editar modulo"
                    aria-label="Editar modulo"
                    (click)="$event.stopPropagation(); openEditModal(module)"
                  >
                    <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="icon-action danger btn-icon"
                    title="Borrar modulo"
                    aria-label="Borrar modulo"
                    [disabled]="module.canceled"
                    (click)="$event.stopPropagation(); askCancel(module)"
                  >
                    <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>
                  </div>
                  <span *ngSwitchDefault>{{ formatGridValue(module, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount"
        [totalItems]="filteredModules.length"
        itemLabel="modulos"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>
  </section>

  <div class="modal-backdrop" *ngIf="modalOpen">
    <section class="modal-panel" role="dialog" aria-modal="true" [attr.aria-label]="modalTitle">
      <header class="modal-header">
        <div>
          <span class="eyebrow">{{ modalMode === 'create' ? 'Crear' : 'Editar' }}</span>
          <h2>{{ modalTitle }}</h2>
        </div>

        <button
          type="button"
          class="close-btn btn-icon"
          title="Cerrar"
          aria-label="Cerrar"
          (click)="closeModal()"
          [disabled]="isSaving"
        >
          <lucide-angular [img]="closeIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
        </button>
      </header>

      <form class="module-form" (ngSubmit)="saveModule()">
        <div class="alert-warning compact-alert field-wide" *ngIf="isLoadingDetail">
          Cargando modulo seleccionado...
        </div>

        <label class="field">
          <span>Codigo</span>
          <input
            type="text"
            name="moduleCode"
            [(ngModel)]="moduleForm.code"
            placeholder="MOD001"
            autocomplete="off"
            [readonly]="modalMode === 'edit'"
            required
          />
        </label>

        <label class="field">
          <span>Nombre</span>
          <input
            type="text"
            name="moduleName"
            [(ngModel)]="moduleForm.name"
            placeholder="Administracion"
            autocomplete="off"
            required
          />
        </label>

        <label class="field">
          <span>Orden</span>
          <input
            type="number"
            name="moduleOrder"
            [(ngModel)]="moduleForm.order"
            placeholder="1"
            required
          />
        </label>

        <div class="alert-error compact-alert field-wide" *ngIf="formError">{{ formError }}</div>

        <footer class="modal-actions field-wide">
          <button type="button" class="ghost-btn btn-outline" (click)="closeModal()" [disabled]="isSaving">
            Cancelar
          </button>

          <button type="submit" class="primary-btn btn-primary" [disabled]="isSaving || isLoadingDetail">
            {{ isSaving ? 'Guardando...' : 'Guardar' }}
          </button>
        </footer>
      </form>
    </section>
  </div>

  <app-confirm-dialog
    [open]="!!moduleToCancel"
    title="Anular modulo"
    [message]="cancelModuleMessage"
    confirmLabel="Anular modulo"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
