<section class="action-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Acciones"
    subtitle="Administra las acciones disponibles en el sistema."
    [icon]="actionIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button
          type="button"
          class="btn-outline app-grid-filter-trigger app-grid-icon-button"
          [class.active]="filtersOpen || statusFilter !== 'all'"
          title="Filtros"
          aria-label="Abrir filtros"
          (click)="toggleFilters($event)"
        >
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>

        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>
          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>
          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>

      <button
        type="button"
        class="primary-btn btn-primary app-grid-icon-button"
        title="Nuevo"
        aria-label="Nuevo"
        routerLink="create"
      >
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="content-grid">
    <article class="actions-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Acciones</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            type="search"
            name="actionSearch"
            [ngModel]="searchTerm"
            appDebouncedSearch
            (debouncedSearch)="searchTerm = $event; onFiltersChange()"
            placeholder="Buscar por codigo o nombre..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadActions()"
          [disabled]="isLoading"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="action-table app-table app-grid-table">
          <thead>
            <tr>
              <th
                *ngFor="let column of gridColumns; trackBy: trackByColumnKey"
                [class]="getColumnClass(column)"
                [style.width]="column.width || null"
              >
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="Cargando acciones..." [icon]="actionIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && !actions.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="No existen acciones registradas." [icon]="actionIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && actions.length && !filteredActions.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron acciones con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let action of paginatedActions; trackBy: trackByActionId"
              class="action-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedActionId === action.id"
              (click)="selectAction(action)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <app-status-badge
                    *ngSwitchCase="'canceled'"
                    [label]="action.canceled ? 'Inactiva' : 'Activa'"
                    [variant]="action.canceled ? 'inactive' : 'active'"
                  ></app-status-badge>

                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                    <button
                      type="button"
                      class="icon-action btn-icon"
                      title="Ver accion"
                      aria-label="Ver accion"
                      (click)="$event.stopPropagation(); selectAction(action)"
                    >
                      <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="icon-action btn-icon"
                      title="Editar accion"
                      aria-label="Editar accion"
                      [routerLink]="['edit', action.id]" (click)="$event.stopPropagation()"
                    >
                      <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>

                    <button
                      type="button"
                      class="icon-action danger btn-icon"
                      title="Borrar accion"
                      aria-label="Borrar accion"
                      [disabled]="action.canceled"
                      (click)="$event.stopPropagation(); askCancel(action)"
                    >
                      <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                    </button>
                  </div>

                  <span *ngSwitchDefault>{{ formatGridValue(action, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount"
        [pageSize]="pageSize"
        [totalItems]="filteredActions.length"
        itemLabel="acciones"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>
  </section>


  <app-confirm-dialog
    [open]="!!actionToCancel"
    title="Anular accion"
    [message]="cancelActionMessage"
    confirmLabel="Anular accion"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
