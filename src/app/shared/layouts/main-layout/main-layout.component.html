<div
  class="fondo"
  [class.sidebar-collapsed]="sidebarCollapsed"
  [class.header-hidden-layout]="headerVariant === 'classic' && !headerVisible"
  [class.floating-header-layout]="headerVariant === 'floating'"
  [class.sidebar-right]="sidebarPosition === 'right'"
  [class.login-entry-sequence]="runLoginEntrySequence"
>
  <section class="card_sidebar">
    <button class="toggle-sidebar" type="button" (click)="toggleSidebar()">
      <lucide-angular
        [img]="sidebarToggleIcon"
        [size]="18"
        [strokeWidth]="2.6"
      ></lucide-angular>
    </button>

    <app-sidebar
      [collapsed]="sidebarCollapsed"
      (selectSection)="onSelectSection($event)"
      (optionSelected)="closeSidebarOnMobile()"
    ></app-sidebar>
  </section>

  <div class="right_content">
    <button
      *ngIf="headerVariant === 'classic' && headerVisible"
      class="header-visibility-btn header-hide-btn"
      type="button"
      aria-label="Ocultar header"
      title="Ocultar header"
      (click)="toggleHeader()"
    >
      <lucide-angular
        [img]="hideHeaderIcon"
        [size]="18"
        [strokeWidth]="2.4"
      ></lucide-angular>
    </button>

    <section
      class="card_header"
      [class.header-hidden]="headerVariant === 'classic' && !headerVisible"
      [class.floating-header-host]="headerVariant === 'floating'"
      [attr.aria-hidden]="headerVariant === 'classic' && !headerVisible"
      [attr.inert]="headerVariant === 'classic' && !headerVisible ? '' : null"
    >
      <app-header
        [img]="img"
        [username]="username"
        [variant]="headerVariant"
      ></app-header>
    </section>

    <button
      *ngIf="headerVariant === 'classic' && !headerVisible"
      class="header-visibility-btn header-show-btn"
      type="button"
      aria-label="Mostrar header"
      title="Mostrar header"
      (click)="toggleHeader()"
    >
      <lucide-angular
        [img]="showHeaderIcon"
        [size]="18"
        [strokeWidth]="2.4"
      ></lucide-angular>
      <span>Header</span>
    </button>

    <main class="card_main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<app-session-timeout-alert></app-session-timeout-alert>
