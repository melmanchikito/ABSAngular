<section class="branch-page page-shell">
  <app-page-header
    eyebrow="Sistema"
    title="Mantenimiento - Sucursal"
    subtitle="Administra las sucursales registradas en el sistema."
    [icon]="branchIcon"
  >
    <div page-actions class="app-page-actions" (click)="$event.stopPropagation()">
      <div class="app-grid-filter-menu">
        <button type="button" class="btn-outline app-grid-filter-trigger app-grid-icon-button" [class.active]="filtersOpen || statusFilter !== 'all' || selectedCompanyFilter !== 'all'" title="Filtros" aria-label="Abrir filtros" (click)="toggleFilters($event)">
          <lucide-angular [img]="filterIcon" [size]="17" [strokeWidth]="2.4"></lucide-angular>
        </button>
        <section class="app-grid-filter-panel" *ngIf="filtersOpen" (click)="$event.stopPropagation()">
          <strong class="app-grid-filter-title">Filtros del listado</strong>
          <label class="app-grid-filter-field">
            <span>Empresa</span>
            <select [(ngModel)]="selectedCompanyFilterDraft">
              <option value="all">Todas las empresas</option>
              <option *ngFor="let company of companies; trackBy: trackByCompanyId" [ngValue]="company.id">{{ company.name }}</option>
            </select>
          </label>
          <label class="app-grid-filter-field">
            <span>Estado</span>
            <select [(ngModel)]="statusFilterDraft">
              <option *ngFor="let option of statusFilterOptions" [ngValue]="option.value">{{ option.label }}</option>
            </select>
          </label>
          <div class="app-grid-filter-actions">
            <button type="button" class="btn-outline" (click)="clearFilters()">Limpiar</button>
            <button type="button" class="btn-primary" (click)="applyFilters()">Aplicar</button>
          </div>
        </section>
      </div>
      <button type="button" class="primary-btn btn-primary app-grid-icon-button" title="Nuevo" aria-label="Nuevo" routerLink="create">
        <lucide-angular [img]="addIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
      </button>
    </div>
  </app-page-header>

  <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <section class="content-grid">
    <article class="branches-panel app-card app-grid-card">
      <header class="app-grid-header">
        <div class="app-grid-title">
          <span class="app-grid-eyebrow">Listado</span>
          <h2 class="app-grid-heading">Sucursales</h2>
        </div>
      </header>

      <section class="app-grid-toolbar">
        <label class="app-grid-search">
          <lucide-angular [img]="searchIcon" [size]="18" [strokeWidth]="2.3"></lucide-angular>
          <input
            type="search"
            name="branchSearch"
            [(ngModel)]="searchTerm"
            (ngModelChange)="onFiltersChange()"
            placeholder="Buscar por codigo, nombre, empresa o ubicacion..."
            autocomplete="off"
          />
        </label>

        <button
          type="button"
          class="ghost-btn btn-outline refresh-btn app-grid-icon-button"
          title="Actualizar"
          aria-label="Actualizar listado"
          (click)="loadBranches()"
          [disabled]="isLoading"
        >
          <lucide-angular [img]="refreshIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
        </button>
      </section>

      <div class="app-grid-table-wrapper">
        <table class="branch-table app-table app-grid-table">
          <thead>
            <tr>
              <th *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)" [style.width]="column.width || null">
                {{ column.label }}
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="isLoading">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="Cargando sucursales..." [icon]="branchIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && !branches.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state message="No existen sucursales registradas." [icon]="branchIcon"></app-empty-state>
              </td>
            </tr>

            <tr *ngIf="!isLoading && branches.length && !filteredBranches.length">
              <td [attr.colspan]="gridColumns.length">
                <app-empty-state
                  message="No se encontraron sucursales con los filtros aplicados."
                  [icon]="searchIcon"
                ></app-empty-state>
              </td>
            </tr>

            <tr
              *ngFor="let branch of paginatedBranches; trackBy: trackByBranchId"
              class="branch-row app-grid-row-clickable"
              [class.app-grid-row-selected]="selectedBranchId === branch.id"
              (click)="selectBranch(branch)"
            >
              <td *ngFor="let column of gridColumns; trackBy: trackByColumnKey" [class]="getColumnClass(column)">
                <ng-container [ngSwitch]="column.key">
                  <app-status-badge *ngSwitchCase="'canceled'" [label]="branch.canceled ? 'Inactiva' : 'Activa'" [variant]="branch.canceled ? 'inactive' : 'active'"></app-status-badge>
                  <div *ngSwitchCase="'actions'" class="app-grid-actions">
                  <button
                    type="button"
                    class="icon-action btn-icon"
                    title="Ver sucursal"
                    aria-label="Ver sucursal"
                    (click)="$event.stopPropagation(); selectBranch(branch)"
                  >
                    <lucide-angular [img]="detailIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="icon-action btn-icon"
                    title="Editar sucursal"
                    aria-label="Editar sucursal"
                    [routerLink]="['edit', branch.id]" (click)="$event.stopPropagation()"
                  >
                    <lucide-angular [img]="editIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>

                  <button
                    type="button"
                    class="icon-action danger btn-icon"
                    title="Borrar sucursal"
                    aria-label="Borrar sucursal"
                    [disabled]="branch.canceled"
                    (click)="$event.stopPropagation(); askCancel(branch)"
                  >
                    <lucide-angular [img]="trashIcon" [size]="17" [strokeWidth]="2.3"></lucide-angular>
                  </button>
                  </div>
                  <span *ngSwitchDefault>{{ formatGridValue(branch, column.key) }}</span>
                </ng-container>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-data-grid-pagination
        [showing]="showingCount"
        [pageSize]="pageSize"
        [totalItems]="filteredBranches.length"
        itemLabel="sucursales"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="setPage($event)"
      ></app-data-grid-pagination>
    </article>

  </section>


  <app-confirm-dialog
    [open]="!!branchToCancel"
    title="Anular sucursal"
    [message]="cancelBranchMessage"
    confirmLabel="Anular sucursal"
    [loading]="isSaving"
    (confirm)="confirmCancel()"
    (cancel)="closeCancelConfirm()"
  ></app-confirm-dialog>
</section>
