<main class="auth-shell">
  <section class="auth-stage">
    <div class="brand-panel">
      <img class="brand-logo" src="assets/auth/LogoAR.svg" alt="Logo ABS" />
      <div class="brand-copy">
        <span>Credenciales</span>
        <h1>Nueva contraseña</h1>
        <p>Actualiza tu clave para continuar usando el sistema.</p>
      </div>
    </div>

    <section class="auth-card" aria-labelledby="new-password-title">
      <div class="card-header">
        <img class="card-logo" src="assets/auth/LogoAR.svg" alt="Logo ABS" />
        <div>
          <p class="eyebrow">Protección</p>
          <h2 id="new-password-title">Crear contraseña</h2>
        </div>
      </div>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="alert error" *ngIf="errorMessage">
          <lucide-angular [img]="alertIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="alert info" *ngIf="infoMessage">
          <lucide-angular [img]="infoIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          <span>{{ infoMessage }}</span>
        </div>

        <label class="field" for="password">
          <span>Contraseña</span>
          <div class="input-wrap">
            <lucide-angular class="field-icon" [img]="keyIcon" [size]="18" [strokeWidth]="2.2"></lucide-angular>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Nueva contraseña"
              autocomplete="new-password"
              formControlName="password"
            />
            <button
              class="icon-button"
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <lucide-angular
                [img]="showPassword ? eyeOffIcon : eyeIcon"
                [size]="18"
                [strokeWidth]="2.2"
              ></lucide-angular>
            </button>
          </div>
        </label>

        <label class="field" for="passwordConfirmation">
          <span>Confirmar contraseña</span>
          <div class="input-wrap">
            <lucide-angular class="field-icon" [img]="lockIcon" [size]="18" [strokeWidth]="2.2"></lucide-angular>
            <input
              id="passwordConfirmation"
              [type]="showPasswordConfirmation ? 'text' : 'password'"
              placeholder="Repite la contraseña"
              autocomplete="new-password"
              formControlName="passwordConfirmation"
            />
            <button
              class="icon-button"
              type="button"
              (click)="togglePasswordConfirmationVisibility()"
              [attr.aria-label]="showPasswordConfirmation ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <lucide-angular
                [img]="showPasswordConfirmation ? eyeOffIcon : eyeIcon"
                [size]="18"
                [strokeWidth]="2.2"
              ></lucide-angular>
            </button>
          </div>
        </label>

        <button class="primary-action" type="submit" [disabled]="isSubmitting">
          <lucide-angular [img]="confirmIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          {{ isSubmitting ? 'Actualizando...' : 'Confirmar' }}
        </button>

        <button class="secondary-action" type="button" (click)="goBack()">
          <lucide-angular [img]="backIcon" [size]="18" [strokeWidth]="2.4"></lucide-angular>
          Volver al login
        </button>
      </form>
    </section>
  </section>
</main>
