<div class="fondo" [class.sidebar-collapsed]="sidebarCollapsed">
  <section class="card_sidebar">
    <button class="toggle-sidebar" type="button" (click)="toggleSidebar()">
      <span>{{ sidebarCollapsed ? '☰' : '✕' }}</span>
    </button>

    <app-sidebar
      [collapsed]="sidebarCollapsed"
      (selectSection)="onSelectSection($event)"
    ></app-sidebar>
  </section>

  <div class="right_content">
    <section class="card_header">
      <app-header [img]="img" [username]="username"></app-header>
    </section>

    <main class="card_main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
